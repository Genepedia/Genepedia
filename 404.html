<!doctype html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-brand-template="404 Not Found - {{APP_NAME}}"></title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@latest/font/bootstrap-icons.min.css">
    <script>
        // GitHub Pages serves this page for missing URLs at ANY depth, so its
        // own location can't be used to resolve site resources. Compute the
        // site root once and load everything from there: on http(s) the site
        // is hosted at the origin root (custom domain), and over file:// we
        // fall back to the directory this file sits in for local previews.
        (function () {
            var root = (location.protocol === 'file:')
                ? location.href.split(/[?#]/)[0].replace(/[^/]*$/, '')
                : location.origin + '/';
            window.__SITE_ROOT__ = root;

            var head = document.head;
            function addStylesheet(href) {
                var link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = root + href;
                head.appendChild(link);
            }
            function addScript(src) {
                var script = document.createElement('script');
                script.src = root + src;
                script.async = false; // preserve execution order
                head.appendChild(script);
            }

            addStylesheet('lib/Web-Framework/styles/common.css');
            addScript('site-info.js');
            addScript('lib/Web-Framework/components/mini-header.js');
            addScript('lib/Web-Framework/components/full-header.js');
            addScript('lib/Web-Framework/components/full-page-toolbar.js');
            addScript('lib/Web-Framework/components/full-footer.js');
            addScript('lib/page-tabs.js');
            addScript('lib/download-manager.js');
            addScript('index.js');
        })();
    </script>
    <style>
        .error-page {
            display: flex;
            justify-content: center;
        }

        .error-page__card {
            width: 100%;
            max-width: 40rem;
            margin: 2.5rem auto;
            text-align: center;
        }

        .error-page__code {
            margin: 0;
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0.02em;
        }

        .error-page__text {
            margin: 0.5rem auto 1.5rem;
            max-width: 32rem;
            opacity: 0.85;
        }

        .error-page__search {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin: 0 auto 1.5rem;
            max-width: 28rem;
        }

        .error-page__search input[type="search"] {
            flex: 1 1 14rem;
            min-width: 12rem;
            padding: 0.55rem 0.75rem;
            border-radius: var(--border-radius-base, 2px);
            border: 1px solid rgba(0, 0, 0, 0.15);
            background: transparent;
            color: inherit;
            font-size: 1rem;
        }

        body.theme-dark .error-page__search input[type="search"] {
            border-color: rgba(255, 255, 255, 0.18);
        }

        .error-page__actions {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <full-header></full-header>
    <article>
        <full-page-toolbar title="Page not found" edit-text="Edit Page" edit-source="404.html"
            variant="page"></full-page-toolbar>
        <main class="main-content error-page">
            <section class="card error-page__card">
                <p class="error-page__code">404</p>
                <p class="error-page__text">We couldn't find the page you were looking for on {{APP_NAME}}.
                    It may have been moved, renamed, or never existed. Try searching for a person below.</p>

                <form id="search404" class="error-page__search" role="search">
                    <label for="search404Input" class="screen-reader-text">Search {{APP_NAME}}</label>
                    <input id="search404Input" name="q" type="search" placeholder="Search {{APP_NAME}}…"
                        autocomplete="off">
                    <button type="submit" class="pure-button pure-button-primary-progressive">Search</button>
                </form>

                <div class="error-page__actions">
                    <a id="go-home" class="pure-button" href="../index.html">
                        <i class="bi bi-house-door" aria-hidden="true"></i> Go to homepage
                    </a>
                    <button type="button" class="pure-button" onclick="history.back()">
                        <i class="bi bi-arrow-left" aria-hidden="true"></i> Go back
                    </button>
                </div>
            </section>
        </main>
        <full-footer></full-footer>
    </article>

    <script>
        (function () {
            var root = window.__SITE_ROOT__ || '/';

            // Home link, resolved from the site root so it works from any 404 location.
            var goHome = document.getElementById('go-home');
            if (goHome) goHome.href = root + 'index.html';

            // Send the search box to the site search page.
            var form = document.getElementById('search404');
            var input = document.getElementById('search404Input');
            if (form && input) {
                form.addEventListener('submit', function (event) {
                    event.preventDefault();
                    var query = (input.value || '').trim();
                    var base = (window.App && typeof window.App.resolveSiteUrl === 'function')
                        ? window.App.resolveSiteUrl('pages/search.html')
                        : root + 'pages/search.html';
                    var url = new URL(base, window.location.href);
                    if (query) url.searchParams.set('q', query);
                    window.location.href = url.href;
                });
            }

            // The toolbar renders a Download menu but only wires it up on
            // people-profile pages, so handle the menu clicks here. Export the
            // error card; "Print" prints, everything else goes through the
            // shared download manager (pdf/png/svg/html/json/markdown; plain
            // text and epub fall back to HTML, matching the rest of the site).
            function exportContentEl() {
                return document.querySelector('.error-page__card')
                    || document.querySelector('article > main.main-content');
            }
            document.addEventListener('click', function (event) {
                var item = event.target.closest && event.target.closest('[data-download-format]');
                if (!item) return;
                event.preventDefault();
                var format = (item.getAttribute('data-download-format') || '').toLowerCase();
                if (format === 'print') {
                    window.print();
                    return;
                }
                if (format === 'plaintext' || format === 'text') {
                    // The shared manager has no real plain-text path (it emits
                    // HTML), so produce an actual .txt here.
                    var textEl = exportContentEl();
                    if (textEl) {
                        var blob = new Blob([textEl.innerText || ''], { type: 'text/plain;charset=utf-8' });
                        var link = document.createElement('a');
                        link.href = URL.createObjectURL(blob);
                        link.download = '404-page-not-found.txt';
                        document.body.appendChild(link);
                        link.click();
                        link.remove();
                        setTimeout(function () { URL.revokeObjectURL(link.href); }, 0);
                    }
                    return;
                }
                var manager = window.AppDownloads;
                if (!manager || typeof manager.handleDownload !== 'function') {
                    window.print();
                    return;
                }
                Promise.resolve(manager.handleDownload(format, {
                    getContentEl: exportContentEl,
                    getTitle: function () { return '404 - Page not found'; }
                })).catch(function (error) {
                    console.error('Download failed', error);
                });
            });

            // The header/footer/toolbar inject their templates (which contain
            // {{APP_NAME}}) only after the scripts above run, which is after
            // site-info.js did its one-time branding pass. Re-apply branding
            // once the custom elements are defined so the tokens get replaced.
            function rebrand() {
                if (window.App && typeof window.App.applyBranding === 'function') {
                    window.App.applyBranding(document);
                }
            }
            if (window.customElements) {
                Promise.allSettled([
                    customElements.whenDefined('full-header'),
                    customElements.whenDefined('full-footer'),
                    customElements.whenDefined('full-page-toolbar')
                ]).then(function () {
                    requestAnimationFrame(rebrand);
                });
            }

            // The footer derives "last edited" from the request URL, which on a
            // 404 is the missing page, not this file. Drive it from 404.html's
            // own history so it shows who last touched the error page.
            fetch(root + 'data/page-history.json', { cache: 'no-store' })
                .then(function (response) { return response.ok ? response.json() : null; })
                .then(function (history) {
                    var entries = history && history['404.html'];
                    if (!entries || !entries.length) return;
                    var footer = document.querySelector('full-footer');
                    if (!footer) return;
                    var latest = entries[0];
                    var when = new Date(latest.date).getTime();
                    var days = Number.isNaN(when)
                        ? 0
                        : Math.max(0, Math.floor((Date.now() - when) / 86400000));
                    footer.setAttribute('last-editor', latest.author || 'Unknown');
                    footer.setAttribute('last-edited-days', String(days));
                })
                .catch(function () { /* offline / file:// — leave last-edited hidden */ });
        })();
    </script>
</body>

</html>
