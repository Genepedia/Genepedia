## Example Nginx server block for serving the Genepedia API under
## https://api.shaunroselt.com/genepedia/ . Adapt paths and PHP socket.

server {
    listen 80;
    server_name api.shaunroselt.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.shaunroselt.com;

    ssl_certificate /etc/letsencrypt/live/api.shaunroselt.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.shaunroselt.com/privkey.pem;

    root /var/www/genepedia;
    index index.php index.html;

    # Serve files under /genepedia/ (api folder should be at /var/www/genepedia/api)
    location /genepedia/ {
        try_files $uri $uri/ =404;
    }

    # PHP handling for files under /genepedia
    location ~ ^/genepedia/.*\.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock; # adjust to your PHP-FPM socket
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
