<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Family Tree Test</title>
    <script src="../site-info.js"></script>
    <link rel="stylesheet" href="./index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@latest/font/bootstrap-icons.min.css" />
</head>

<body>
    <div id="app">
        <header class="toolbar" role="banner">
            <div class="toolbar__left">
                <div class="toolbar__title">Family Tree</div>
                <div class="toolbar__hint">Drag to pan • Scroll to zoom</div>
            </div>

            <div class="toolbar__right">
                <div class="tree-search" role="search" aria-label="Search people in this tree">
                    <i class="bi bi-search tree-search__icon" aria-hidden="true"></i>
                    <input id="treeSearchInput" class="tree-search__input" type="search" placeholder="Search this tree"
                        autocomplete="off" />
                    <div id="treeSearchResults" class="tree-search__results tree-search__results--hidden" role="listbox"
                        aria-label="Search results"></div>
                </div>
                <div id="treePeopleStats" class="toolbar__stats" aria-live="polite"></div>
                <button id="importGedcomBtn" type="button">Import GEDCOM</button>
                <input id="gedcomFileInput" type="file" accept=".ged,.gedcom,text/plain" hidden />
                <button id="fitBtn" type="button">Fit</button>
                <button id="resetBtn" type="button">Reset</button>
                <button id="downloadSvgBtn" type="button" aria-label="Download SVG">SVG</button>
                <button id="downloadPngBtn" type="button" aria-label="Download PNG">PNG</button>
                <button id="zoomOutBtn" type="button" aria-label="Zoom out">-</button>
                <button id="zoomInBtn" type="button" aria-label="Zoom in">+</button>
            </div>
        </header>

        <div id="mainLayout" class="main">
            <main id="viewport" class="viewport" tabindex="0" aria-label="Family tree viewport">
                <div id="scene" class="scene">
                    <svg id="links" class="links" xmlns="http://www.w3.org/2000/svg"></svg>
                    <div id="nodes" class="nodes"></div>
                </div>
            </main>

            <aside id="sidebar" class="sidebar sidebar--hidden" aria-label="Selected person details">
                <div class="sidebar__header">
                    <div class="sidebar__title">Details</div>
                    <button id="closeSidebarBtn" class="icon-button sidebar__close" type="button"
                        aria-label="Close sidebar">
                        <i class="bi bi-x-lg" aria-hidden="true"></i>
                    </button>
                </div>
                <div id="sidebarContent" class="sidebar__content"></div>
            </aside>
        </div>
    </div>

    <div id="relationMenu" class="menu menu--hidden" role="menu" aria-label="Add relative menu"></div>

<script src="../lib/gedcom.js"></script>
    <script type="module" src="./index.js"></script>
</body>

</html>
