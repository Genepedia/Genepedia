<!doctype html>
<html lang="en" dir="ltr">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>People - {{APP_NAME}}</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@latest/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="../lib/common.css">
	<style>
		/* Page-specific layout */
		.people-list {
			max-width: 72rem;
			margin: 1.5rem auto;
			padding: 1rem;
		}

		/* Controls */
		.people-list__controls {
			display: flex;
			gap: 0.75rem;
			align-items: center;
			margin-bottom: 0.75rem;
		}

		#peopleSearch {
			flex: 1 1 220px;
			min-width: 180px;
			padding: 0.5rem 0.75rem;
			border: 1px solid var(--border-color-subtle);
			background: var(--background-color-base);
			color: var(--color-base);
			box-sizing: border-box;
			outline: none;
			border-radius: 0; /* ensure no rounded corners */
		}

		/* Table styles */
		.people-list__table-wrap {
			overflow-x: auto;
		}

		.site-table {
			width: 100%;
			border-collapse: collapse;
			border: 1px solid var(--border-color-subtle);
			box-sizing: border-box;
		}

		.site-table th,
		.site-table td {
			padding: 0.6rem 0.75rem;
			text-align: left;
			border-bottom: 1px solid var(--border-color-subtle);
			box-sizing: border-box;
		}

		.site-table thead th {
			background: var(--background-color-neutral-subtle);
			font-weight: 600;
			cursor: pointer;
			user-select: none;
			white-space: nowrap;
		}

		.site-table tbody tr:hover td {
			background: rgba(0, 0, 0, 0.02);
		}

		.sort-indicator {
			display: inline-block;
			width: 1.1rem;
			text-align: right;
			margin-left: 0.35rem;
		}

		/* Remove rounded corners on this page's chrome */
		article.no-radius * {
			border-radius: 0 !important;
		}

		/* Hide the toolbar's title so only the page H1 is visible */
		full-page-toolbar .people-page__title {
			display: none !important;
		}
	</style>
</head>

<body>
	<full-header></full-header>
	<article class="no-radius">
		<full-page-toolbar title="People {{APP_NAME}}" edit-text="Edit Page" edit-href="#" variant="people"></full-page-toolbar>
		<main class="main-content people-page">
			<section class="card people-list">
				<h1>People</h1>

				<div class="people-list__controls">
					<input id="peopleSearch" type="search" placeholder="Search ID, first or last name" aria-label="Search people">
					<div id="count" aria-live="polite"></div>
				</div>

				<div class="people-list__table-wrap">
					<table id="peopleTable" class="site-table">
						<thead>
							<tr>
								<th scope="col" data-key="id" tabindex="0" role="button" aria-sort="none">ID <span class="sort-indicator" aria-hidden="true"></span></th>
								<th scope="col" data-key="firstName" tabindex="0" role="button" aria-sort="none">First name <span class="sort-indicator" aria-hidden="true"></span></th>
								<th scope="col" data-key="lastName" tabindex="0" role="button" aria-sort="none">Last name <span class="sort-indicator" aria-hidden="true"></span></th>
							</tr>
						</thead>
						<tbody></tbody>
					</table>
				</div>
			</section>
		</main>
		<full-footer></full-footer>
	</article>

	<script src="../site-info.js"></script>
	<script src="../components/mini-header.js"></script>
	<script src="../components/full-header.js"></script>
	<script src="../components/full-page-toolbar.js"></script>
	<script src="../components/full-footer.js"></script>

	<script>
		document.addEventListener('DOMContentLoaded', () => {
			const searchEl = document.getElementById('peopleSearch');
			const table = document.getElementById('peopleTable');
			const tbody = table.querySelector('tbody');
			const countEl = document.getElementById('count');
			const headers = Array.from(table.querySelectorAll('thead th[data-key]'));

			let people = [];
			let sortKey = 'id';
			let sortDir = 1; // 1 = asc, -1 = desc

			const fetchPeople = async () => {
				try {
					const res = await fetch('people.json', { cache: 'no-store' });
					if (!res.ok) throw new Error('Failed to fetch people.json: ' + res.status);
					const data = await res.json();
					people = Array.isArray(data.people) ? data.people : [];
					render();
				} catch (err) {
					console.error(err);
					tbody.innerHTML = '<tr><td colspan="3">Could not load people list.</td></tr>';
					countEl.textContent = '';
				}
			};

			function sortBy(key) {
				if (sortKey === key) {
					sortDir = -sortDir;
				} else {
					sortKey = key;
					sortDir = 1;
				}
				render();
			}

			function applyFilterAndSort() {
				const term = (searchEl.value || '').trim().toLowerCase();
				let list = people.filter((p) => {
					if (!term) return true;
					return String(p.id).toLowerCase().includes(term) || (p.firstName || '').toLowerCase().includes(term) || (p.lastName || '').toLowerCase().includes(term);
				});

				list.sort((a, b) => {
					if (sortKey === 'id') {
						const na = parseInt(a.id, 10) || 0;
						const nb = parseInt(b.id, 10) || 0;
						return (na - nb) * sortDir;
					}

					const va = String(a[sortKey] || '').toLowerCase();
					const vb = String(b[sortKey] || '').toLowerCase();
					return va.localeCompare(vb) * sortDir;
				});

				return list;
			}

			function render() {
				const list = applyFilterAndSort();
				countEl.textContent = list.length === 1 ? '1 person' : `${list.length} people`;

				tbody.innerHTML = '';
				const frag = document.createDocumentFragment();

				for (const p of list) {
					const tr = document.createElement('tr');
					const profileUrl = `${encodeURIComponent(p.id)}/profile.html`;

					const tdId = document.createElement('td');
					const aId = document.createElement('a');
					aId.href = profileUrl;
					aId.textContent = p.id;
					aId.className = 'person-link';
					tdId.appendChild(aId);

					const tdFirst = document.createElement('td');
					const aFirst = document.createElement('a');
					aFirst.href = profileUrl;
					aFirst.textContent = p.firstName || '';
					tdFirst.appendChild(aFirst);

					const tdLast = document.createElement('td');
					const aLast = document.createElement('a');
					aLast.href = profileUrl;
					aLast.textContent = p.lastName || '';
					tdLast.appendChild(aLast);

					tr.appendChild(tdId);
					tr.appendChild(tdFirst);
					tr.appendChild(tdLast);
					frag.appendChild(tr);
				}

				tbody.appendChild(frag);
				updateSortIndicators();
			}

			function updateSortIndicators() {
				headers.forEach((th) => {
					const key = th.dataset.key;
					const indicator = th.querySelector('.sort-indicator');
					if (key === sortKey) {
						th.setAttribute('aria-sort', sortDir === 1 ? 'ascending' : 'descending');
						if (indicator) indicator.textContent = sortDir === 1 ? '▲' : '▼';
					} else {
						th.setAttribute('aria-sort', 'none');
						if (indicator) indicator.textContent = '';
					}
				});
			}

			function debounce(fn, wait = 120) {
				let t = null;
				return (...args) => {
					clearTimeout(t);
					t = setTimeout(() => fn.apply(this, args), wait);
				};
			}

			headers.forEach((th) => {
				th.addEventListener('click', () => sortBy(th.dataset.key));
				th.addEventListener('keydown', (e) => {
					if (e.key === 'Enter' || e.key === ' ') {
						e.preventDefault();
						sortBy(th.dataset.key);
					}
				});
			});

			searchEl.addEventListener('input', debounce(render, 150));

			fetchPeople();
		});
	</script>

	<script src="../index.js"></script>
</body>

</html>
