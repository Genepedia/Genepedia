<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-brand-template="Settings - {{APP_NAME}}"></title>
    <script src="../site-info.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@latest/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../lib/Web-Framework/styles/common.css">
<script defer src="../lib/Web-Framework/components/mini-header.js"></script>
    <script defer src="../lib/Web-Framework/components/mini-footer.js"></script>
    <script defer src="../lib/Web-Framework/components/full-header.js"></script>
    <script defer src="../lib/Web-Framework/components/full-page-toolbar.js"></script>
    <script defer src="../lib/page-tabs.js"></script>
    <script defer src="../lib/Web-Framework/components/full-footer.js"></script>
    <script defer src="../lib/Web-Framework/components/sister-projects.js"></script>

</head>

<body>
    <full-header></full-header>

    <article>
        <full-page-toolbar title="App Settings" edit-text="Edit Page" edit-source="pages/settings.html"
            variant="page"></full-page-toolbar>
        <main class="settings-page main-content">

            <div class="settings-page__grid">
                <section class="settings-page__card">
                    <div class="settings-page__section">
                        <h2 class="settings-page__section-heading">Appearance</h2>
                        <div class="form-group">
                            <label for="setting-theme">Theme</label>
                            <select id="setting-theme">
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                            </select>
                        </div>
                    </div>

                    <div class="settings-page__section">
                        <h2 class="settings-page__section-heading">Layout</h2>
                        <div class="form-group">
                            <label for="setting-layout">Page layout</label>
                            <select id="setting-layout">
                                <option value="comfortable">Comfortable</option>
                                <option value="compact">Compact</option>
                            </select>
                        </div>
                    </div>

                    <div class="settings-page__section">
                        <h2 class="settings-page__section-heading">Downloads</h2>
                        <div class="form-group">
                            <label for="setting-default-format">Default export format</label>
                            <select id="setting-default-format">
                                <option value="png">PNG</option>
                                <option value="pdf">PDF (Print)</option>
                                <option value="svg">SVG</option>
                                <option value="html">HTML</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="setting-inline-images">
                                Inline remote images when exporting
                            </label>
                        </div>
                    </div>

                    <div class="settings-page__section">
                        <h2 class="settings-page__section-heading">Language</h2>
                        <div class="form-group">
                            <label for="setting-language">Language</label>
                            <select id="setting-language">
                                <option value="en">English</option>
                                <option value="af">Afrikaans</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" id="save-settings"
                            class="pure-button pure-button-primary-progressive">Save settings</button>
                        <button type="button" id="reset-settings" class="pure-button">Reset to defaults</button>
                        <span id="settings-saved" role="status" aria-live="polite"
                            style="display:none; color:var(--color-success);">Saved</span>
                    </div>
                </section>
            </div>
        </main>
        <full-footer></full-footer>
    </article>
    <script>
        (function () {
            const STORAGE_KEY = 'app-app-settings';
            const THEME_KEY = 'app-theme';
            const DEFAULTS = {
                theme: 'dark',
                layout: 'comfortable',
                defaultFormat: 'png',
                inlineImages: true,
                language: 'en'
            };

            const qs = (sel) => document.getElementById(sel);

            function readSettings() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    return raw ? JSON.parse(raw) : { ...DEFAULTS };
                } catch (e) {
                    return { ...DEFAULTS };
                }
            }

            function writeSettings(s) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
                    localStorage.setItem(THEME_KEY, s.theme);
                    return true;
                } catch (e) {
                    console.error('Could not save settings', e);
                    return false;
                }
            }

            function applyPreview(s) {
                document.body.classList.toggle('theme-dark', s.theme === 'dark');
            }

            function populateForm(s) {
                qs('setting-theme').value = s.theme;
                qs('setting-layout').value = s.layout;
                qs('setting-default-format').value = s.defaultFormat;
                qs('setting-inline-images').checked = Boolean(s.inlineImages);
                qs('setting-language').value = s.language;
            }

            function readForm() {
                return {
                    theme: qs('setting-theme').value,
                    layout: qs('setting-layout').value,
                    defaultFormat: qs('setting-default-format').value,
                    inlineImages: qs('setting-inline-images').checked,
                    language: qs('setting-language').value
                };
            }

            function showStatus(msg) {
                const status = qs('settings-saved');
                status.textContent = msg;
                status.style.display = 'inline';
                setTimeout(() => { status.style.display = 'none'; }, 1800);
            }

            document.addEventListener('DOMContentLoaded', () => {
                const settings = readSettings();
                populateForm(settings);
                applyPreview(settings);

                qs('save-settings').addEventListener('click', () => {
                    const s = readForm();
                    const ok = writeSettings(s);
                    if (ok) {
                        showStatus('Saved');
                        // reload to ensure header picks up theme input states
                        setTimeout(() => { location.reload(); }, 600);
                    } else {
                        showStatus('Save failed');
                    }
                });

                qs('reset-settings').addEventListener('click', () => {
                    try { localStorage.removeItem(STORAGE_KEY); localStorage.setItem(THEME_KEY, DEFAULTS.theme); } catch (e) { }
                    populateForm(DEFAULTS);
                    applyPreview(DEFAULTS);
                    showStatus('Reset');
                    setTimeout(() => { location.reload(); }, 600);
                });
            });
        })();
    </script>
    <script defer src="../index.js"></script>
</body>

</html>
