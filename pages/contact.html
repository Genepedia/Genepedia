<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title data-brand-template="{{APP_NAME}} - Contact"></title>
    <script src="../site-info.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@latest/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../lib/Web-Framework/styles/common.css">
    <style>
        /* Minimal layout tweaks only — reuse shared .card and .form-group styles */
        .contact-page {
            display: flex;
            justify-content: center;
            padding: 1rem 0;
        }

        .contact-page__card {
            max-width: none;
            width: 100%;
            border-radius: 0;
            box-shadow: none;
        }

        .contact-page #contact-form {
            width: 100%;
        }

        .contact-page__form-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .contact-page .form-group {
            width: 100%;
            min-width: 0;
        }

        .contact-page .form-group input[type="text"],
        .contact-page .form-group textarea {
            width: 100%;
            box-sizing: border-box;
            border-radius: 0;
        }

        .contact-page .form-group input::placeholder,
        .contact-page .form-group textarea::placeholder {
            color: var(--color-subtle);
            opacity: 1;
        }

        .contact-page .form-group label .contact-page__required {
            color: var(--color-subtle);
            font-weight: 400;
        }

        .contact-reason-select {
            position: relative;
            width: 100%;
        }

        .contact-reason-select__native {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
            pointer-events: none;
        }

        .contact-page .form-group:has(.contact-reason-select) {
            overflow: visible;
        }

        .contact-reason-select__trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border-color-subtle);
            border-radius: 0;
            background: var(--background-color-neutral-subtle);
            padding: 0.95rem 1rem;
            color: var(--color-base);
            font: inherit;
            cursor: pointer;
            text-align: left;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .contact-reason-select__trigger:hover {
            border-color: var(--color-progressive);
        }

        .contact-reason-select__trigger:focus-visible {
            outline: 2px solid var(--color-progressive);
            outline-offset: 2px;
        }

        .contact-reason-select__trigger[aria-expanded="true"] {
            border-color: var(--color-progressive);
            box-shadow: 0 0 0 1px var(--color-progressive);
        }

        .contact-reason-select__selected {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            min-width: 0;
        }

        .contact-reason-select__icon {
            color: var(--color-progressive);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .contact-reason-select__chevron {
            color: var(--color-subtle);
            flex-shrink: 0;
            transition: transform 0.15s ease;
        }

        .contact-reason-select__trigger[aria-expanded="true"] .contact-reason-select__chevron {
            transform: rotate(180deg);
        }

        .contact-reason-select__menu {
            position: absolute;
            z-index: var(--z-index-dropdown, 50);
            top: calc(100% + 0.35rem);
            left: 0;
            right: 0;
            margin: 0;
            padding: 0.35rem;
            list-style: none;
            border: 1px solid var(--border-color-subtle);
            border-radius: 0;
            background: var(--background-color-base);
            box-shadow: var(--box-shadow-small);
        }

        .contact-reason-select__menu[hidden] {
            display: none;
        }

        .contact-reason-select__option {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.75rem 0.85rem;
            cursor: pointer;
            color: var(--color-base);
        }

        .contact-reason-select__option:hover,
        .contact-reason-select__option:focus-visible {
            background: var(--background-color-neutral-subtle);
            outline: none;
        }

        .contact-reason-select__option--selected {
            background: var(--background-color-neutral-subtle);
            font-weight: 600;
        }

        .contact-reason-select__option .bi {
            color: var(--color-progressive);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .contact-page .form-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
            margin-top: 1.5rem;
        }

        .contact-page .form-actions .contact-page__status {
            margin-right: auto;
        }

        .contact-page__field-hint {
            margin: 0;
            font-size: 0.92rem;
            color: var(--color-subtle);
        }

        .contact-page__status {
            min-height: 1.5rem;
            color: var(--color-progressive);
            font-weight: 600;
        }

        .contact-page__status[data-state="success"] {
            color: var(--color-success, #1a7f37);
        }

        .contact-page__status[data-state="error"] {
            color: var(--color-danger, #cf222e);
        }

        .contact-page__status[data-state="pending"] {
            color: var(--color-subtle);
        }

        .contact-page__status a {
            color: inherit;
            text-decoration: underline;
        }
    </style>
</head>

<body class="theme-dark">
    <full-header></full-header>

    <article>
        <full-page-toolbar title="Contact {{APP_NAME}}" edit-text="Edit Page" edit-source="pages/contact.html"
            variant="page"></full-page-toolbar>
        <main class="settings-page main-content">
            <section>
                <div class="settings-page__inner">
                    <div class="contact-page">
                        <div class="card settings-page__card contact-page__card">
                            <p class="contact-page__section-copy">Thank you for your message — we'll look at it as soon
                                as possible.</p>

                            <form id="contact-form" novalidate>
                                <div class="contact-page__form-grid">
                                    <div class="form-group">
                                        <label for="contact-reason-trigger">Reason</label>
                                        <div class="contact-reason-select" id="contact-reason-select">
                                            <select id="contact-reason" name="reason" required
                                                class="contact-reason-select__native" tabindex="-1" aria-hidden="true">
                                                <option value="question">General Question</option>
                                                <option value="bug">Bug Report</option>
                                                <option value="enhancement">Feature Request</option>
                                            </select>
                                            <button type="button" class="contact-reason-select__trigger"
                                                id="contact-reason-trigger" aria-haspopup="listbox"
                                                aria-expanded="false" aria-controls="contact-reason-menu">
                                                <span class="contact-reason-select__selected">
                                                    <i class="bi bi-chat-left-text contact-reason-select__icon"
                                                        id="contact-reason-icon" aria-hidden="true"></i>
                                                    <span class="contact-reason-select__label"
                                                        id="contact-reason-label-text">General Question</span>
                                                </span>
                                                <i class="bi bi-chevron-down contact-reason-select__chevron"
                                                    aria-hidden="true"></i>
                                            </button>
                                            <ul class="contact-reason-select__menu" id="contact-reason-menu"
                                                role="listbox" hidden>
                                                <li class="contact-reason-select__option contact-reason-select__option--selected"
                                                    role="option" data-value="question" tabindex="0"
                                                    aria-selected="true">
                                                    <i class="bi bi-chat-left-text" aria-hidden="true"></i>
                                                    <span>General Question</span>
                                                </li>
                                                <li class="contact-reason-select__option" role="option" data-value="bug"
                                                    tabindex="-1" aria-selected="false">
                                                    <i class="bi bi-bug" aria-hidden="true"></i>
                                                    <span>Bug Report</span>
                                                </li>
                                                <li class="contact-reason-select__option" role="option"
                                                    data-value="enhancement" tabindex="-1" aria-selected="false">
                                                    <i class="bi bi-lightbulb" aria-hidden="true"></i>
                                                    <span>Feature Request</span>
                                                </li>
                                            </ul>
                                        </div>
                                    </div>

                                    <div class="form-group">
                                        <label for="contact-subject">Subject <span class="contact-page__required"
                                                aria-hidden="true">(required)</span></label>
                                        <input type="text" id="contact-subject" name="subject" required
                                            aria-required="true" placeholder="Brief summary of your message" />
                                    </div>

                                    <div class="form-group">
                                        <label for="contact-message">Message <span class="contact-page__required"
                                                aria-hidden="true">(required)</span></label>
                                        <textarea id="contact-message" name="message" rows="8" required
                                            aria-required="true"
                                            placeholder="Describe your question, bug, or feature request in detail"></textarea>
                                    </div>
                                </div>

                                <div class="form-actions">
                                    <span id="contact-status" role="status" aria-live="polite"
                                        class="contact-page__status"></span>
                                    <button type="submit" class="pure-button pure-button-primary-progressive">Send
                                        Message</button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </section>
        </main>
        <full-footer></full-footer>
    </article>

    <script src="../lib/Web-Framework/components/mini-header.js"></script>
    <script src="../lib/Web-Framework/components/mini-footer.js"></script>
    <script src="../lib/Web-Framework/components/full-header.js"></script>
    <script src="../lib/Web-Framework/components/full-page-toolbar.js"></script>
    <script src="../lib/page-tabs.js"></script>
    <script src="../lib/Web-Framework/components/full-footer.js"></script>
    <script src="../lib/Web-Framework/components/sister-projects.js"></script>
    <script src="../index.js"></script>
    <script>
        (function () {
            const DEFAULT_REPO = 'Genepedia/Genepedia';
            const REASON_CONFIG = {
                question: { title: 'General Question', label: 'Question', icon: 'bi-chat-left-text' },
                bug: { title: 'Bug Report', label: 'Bug', icon: 'bi-bug' },
                enhancement: { title: 'Feature Request', label: 'Enhancement', icon: 'bi-lightbulb' },
            };

            if (!document.getElementById('contact-form')) {
                return;
            }

            let repoSlug = DEFAULT_REPO;

            function getReasonElements() {
                const menu = document.getElementById('contact-reason-menu');
                return {
                    input: document.getElementById('contact-reason'),
                    trigger: document.getElementById('contact-reason-trigger'),
                    menu: menu,
                    icon: document.getElementById('contact-reason-icon'),
                    labelText: document.getElementById('contact-reason-label-text'),
                    options: menu ? Array.from(menu.querySelectorAll('.contact-reason-select__option')) : [],
                };
            }

            function getReasonDetails() {
                const reasonInput = getReasonElements().input;
                return REASON_CONFIG[reasonInput?.value] || REASON_CONFIG.question;
            }

            function updateReasonPreview() {
                const details = getReasonDetails();
                const labelPreview = document.getElementById('contact-label-preview');
                if (labelPreview) {
                    labelPreview.textContent = details.label;
                }
            }

            function syncReasonDisplay(value) {
                const details = REASON_CONFIG[value] || REASON_CONFIG.question;
                const reason = getReasonElements();

                if (reason.labelText) {
                    reason.labelText.textContent = details.title;
                }
                if (reason.icon) {
                    reason.icon.className = 'bi ' + details.icon + ' contact-reason-select__icon';
                }
                reason.options.forEach(function (option) {
                    const isSelected = option.dataset.value === value;
                    option.classList.toggle('contact-reason-select__option--selected', isSelected);
                    option.setAttribute('aria-selected', isSelected ? 'true' : 'false');
                    option.tabIndex = isSelected ? 0 : -1;
                });
            }

            function setReasonValue(value) {
                const reasonInput = getReasonElements().input;
                if (!reasonInput || !REASON_CONFIG[value]) {
                    return;
                }

                reasonInput.value = value;
                syncReasonDisplay(value);
                updateReasonPreview();
                reasonInput.dispatchEvent(new Event('change', { bubbles: true }));
            }

            function closeReasonMenu() {
                const reason = getReasonElements();
                if (!reason.trigger || !reason.menu) {
                    return;
                }

                reason.menu.hidden = true;
                reason.trigger.setAttribute('aria-expanded', 'false');
            }

            function openReasonMenu() {
                const reason = getReasonElements();
                if (!reason.trigger || !reason.menu || !reason.input) {
                    return;
                }

                reason.menu.hidden = false;
                reason.trigger.setAttribute('aria-expanded', 'true');
                const selectedOption = reason.options.find(function (option) {
                    return option.dataset.value === reason.input.value;
                });
                const focusTarget = selectedOption || reason.options[0];
                if (focusTarget) {
                    focusTarget.focus();
                }
            }

            function bindReasonSelect() {
                if (document.documentElement.dataset.contactReasonSelectBound === 'true') {
                    return;
                }

                document.documentElement.dataset.contactReasonSelectBound = 'true';

                document.addEventListener('click', function (event) {
                    if (!document.getElementById('contact-form')) {
                        return;
                    }

                    const reason = getReasonElements();
                    const trigger = event.target.closest('#contact-reason-trigger');
                    const option = event.target.closest('#contact-reason-menu .contact-reason-select__option');

                    if (trigger) {
                        event.stopPropagation();
                        if (reason.menu?.hidden) {
                            openReasonMenu();
                        } else {
                            closeReasonMenu();
                        }
                        return;
                    }

                    if (option) {
                        setReasonValue(option.dataset.value);
                        closeReasonMenu();
                        reason.trigger?.focus();
                        return;
                    }

                    if (reason.menu && !reason.menu.hidden && !event.target.closest('#contact-reason-select')) {
                        closeReasonMenu();
                    }
                });

                document.addEventListener('keydown', function (event) {
                    if (!document.getElementById('contact-form')) {
                        return;
                    }

                    const reason = getReasonElements();
                    const activeOption = event.target.closest('#contact-reason-menu .contact-reason-select__option');
                    const onTrigger = event.target.closest('#contact-reason-trigger');

                    if (onTrigger) {
                        if (event.key === 'ArrowDown' || event.key === 'ArrowUp' || event.key === 'Enter' || event.key === ' ') {
                            event.preventDefault();
                            openReasonMenu();
                        }

                        if (event.key === 'Escape') {
                            closeReasonMenu();
                        }
                        return;
                    }

                    if (!activeOption || !reason.menu || reason.menu.hidden) {
                        return;
                    }

                    const currentIndex = reason.options.findIndex(function (option) {
                        return option === document.activeElement;
                    });

                    if (event.key === 'Escape') {
                        event.preventDefault();
                        closeReasonMenu();
                        reason.trigger?.focus();
                        return;
                    }

                    if (event.key === 'ArrowDown') {
                        event.preventDefault();
                        const nextIndex = currentIndex < reason.options.length - 1 ? currentIndex + 1 : 0;
                        reason.options[nextIndex]?.focus();
                        return;
                    }

                    if (event.key === 'ArrowUp') {
                        event.preventDefault();
                        const previousIndex = currentIndex > 0 ? currentIndex - 1 : reason.options.length - 1;
                        reason.options[previousIndex]?.focus();
                        return;
                    }

                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        const selected = reason.options[currentIndex];
                        if (selected) {
                            setReasonValue(selected.dataset.value);
                            closeReasonMenu();
                            reason.trigger?.focus();
                        }
                    }
                });
            }

            function refreshContactForm() {
                const reasonInput = getReasonElements().input;
                if (reasonInput) {
                    syncReasonDisplay(reasonInput.value);
                }
            }

            function resolveApiUrl(fileName) {
                const base = window.App?.getGitHubApiBase?.() || window.App?.GitHubApiBase || '';
                const trimmed = String(base).trim();
                if (!trimmed) {
                    return '';
                }

                try {
                    return new URL(fileName, trimmed.replace(/\/+$/, '') + '/').href;
                } catch (error) {
                    return '';
                }
            }

            function getFetchInit(init) {
                if (window.App?.getGitHubFetchInit) {
                    return window.App.getGitHubFetchInit(init);
                }

                return {
                    ...(init || {}),
                    credentials: 'include',
                    headers: {
                        Accept: 'application/json',
                        ...((init && init.headers) || {}),
                    },
                };
            }

            async function loadRepoConfig() {
                const configUrl = resolveApiUrl('github-config.php');
                if (!configUrl) {
                    return;
                }

                try {
                    const response = await fetch(configUrl, getFetchInit({ cache: 'no-store' }));
                    const payload = await response.json().catch(function () {
                        return null;
                    });

                    if (response.ok && payload && payload.ok && payload.repo) {
                        repoSlug = String(payload.repo).trim() || DEFAULT_REPO;
                    }
                } catch (error) {
                    repoSlug = DEFAULT_REPO;
                }
            }

            function detectOperatingSystem(userAgent, platform) {
                const source = (userAgent + ' ' + platform).toLowerCase();
                if (source.includes('windows')) {
                    return 'Windows';
                }
                if (source.includes('android')) {
                    return 'Android';
                }
                if (source.includes('iphone') || source.includes('ipad') || source.includes('ipod') || source.includes('ios')) {
                    return 'iOS';
                }
                if (source.includes('mac os') || source.includes('macintosh') || source.includes('macintel')) {
                    return 'macOS';
                }
                if (source.includes('linux')) {
                    return 'Linux';
                }
                if (source.includes('cros')) {
                    return 'ChromeOS';
                }
                return platform || 'Unknown';
            }

            function detectBrowser(userAgent) {
                const source = String(userAgent || '');
                const matchers = [
                    { name: 'Edge', regex: /Edg\/([^\s]+)/ },
                    { name: 'Opera', regex: /OPR\/([^\s]+)/ },
                    { name: 'Chrome', regex: /Chrome\/([^\s]+)/ },
                    { name: 'Firefox', regex: /Firefox\/([^\s]+)/ },
                    { name: 'Safari', regex: /Version\/([^\s]+).*Safari/ },
                ];

                for (const matcher of matchers) {
                    const result = source.match(matcher.regex);
                    if (result) {
                        return matcher.name + ' ' + result[1];
                    }
                }

                return navigator.userAgentData?.brands?.map(function (brand) {
                    return brand.brand + ' ' + brand.version;
                }).join(', ') || 'Unknown';
            }

            function collectDiagnostics() {
                const nav = window.navigator || {};
                const screenInfo = window.screen || {};
                const viewportWidth = Math.max(document.documentElement?.clientWidth || 0, window.innerWidth || 0);
                const viewportHeight = Math.max(document.documentElement?.clientHeight || 0, window.innerHeight || 0);
                const userAgent = String(nav.userAgent || '');
                const platform = String(nav.userAgentData?.platform || nav.platform || '');
                const languages = Array.isArray(nav.languages) && nav.languages.length
                    ? nav.languages.join(', ')
                    : String(nav.language || '');
                const timezone = (window.Intl && Intl.DateTimeFormat)
                    ? Intl.DateTimeFormat().resolvedOptions().timeZone || 'Unknown'
                    : 'Unknown';

                return {
                    browser: detectBrowser(userAgent),
                    operatingSystem: detectOperatingSystem(userAgent, platform),
                    viewport: viewportWidth + 'x' + viewportHeight,
                    screen: String(screenInfo.width || 0) + 'x' + String(screenInfo.height || 0),
                    pixelRatio: String(window.devicePixelRatio || 1),
                    language: languages || 'Unknown',
                    timezone,
                    colorScheme: window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light',
                    reducedMotion: window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches ? 'reduce' : 'no-preference',
                    online: nav.onLine === false ? 'offline' : 'online',
                    pageUrl: window.location.href,
                    userAgent,
                };
            }

            function buildDiagnosticsText() {
                const diagnostics = collectDiagnostics();
                return [
                    'Browser: ' + diagnostics.browser,
                    'Operating System: ' + diagnostics.operatingSystem,
                    'Screen Resolution: ' + diagnostics.screen,
                    'Viewport: ' + diagnostics.viewport,
                    'Device Pixel Ratio: ' + diagnostics.pixelRatio,
                    'Language: ' + diagnostics.language,
                    'Time Zone: ' + diagnostics.timezone,
                    'Preferred Color Scheme: ' + diagnostics.colorScheme,
                    'Reduced Motion: ' + diagnostics.reducedMotion,
                    'Network Status: ' + diagnostics.online,
                    'Page URL: ' + diagnostics.pageUrl,
                    'User Agent: ' + diagnostics.userAgent,
                ].join('\n');
            }

            // Fallback issue body for the "open on GitHub instead" link shown only
            // when the background API submission could not be used.
            function buildIssueBody(reasonDetails, subject, message) {
                return [
                    'Reason: ' + reasonDetails.title,
                    '',
                    'Message',
                    message,
                    '',
                    'Environment',
                    buildDiagnosticsText(),
                ].join('\n');
            }

            function buildGitHubIssueUrl(reasonDetails, subject, message) {
                const issueUrl = new URL('https://github.com/' + repoSlug + '/issues/new');
                issueUrl.searchParams.set('labels', reasonDetails.label);
                issueUrl.searchParams.set('title', subject);
                issueUrl.searchParams.set('body', buildIssueBody(reasonDetails, subject, message));
                return issueUrl.toString();
            }

            function validateRequiredField(input, message) {
                if (!input) {
                    return true;
                }

                if (!input.value.trim()) {
                    input.setCustomValidity(message);
                    input.reportValidity();
                    return false;
                }

                input.setCustomValidity('');
                return true;
            }

            function setContactStatus(text, options) {
                const statusEl = document.getElementById('contact-status');
                if (!statusEl) {
                    return;
                }
                const opts = options || {};
                statusEl.dataset.state = opts.state || '';
                if (opts.html) {
                    statusEl.innerHTML = opts.html;
                } else {
                    statusEl.textContent = text || '';
                }
            }

            function escapeHtml(value) {
                return String(value).replace(/[&<>"']/g, function (char) {
                    return {
                        '&': '&amp;',
                        '<': '&lt;',
                        '>': '&gt;',
                        '"': '&quot;',
                        "'": '&#39;',
                    }[char];
                });
            }

            // Submit the contact form by asking the API to open a GitHub issue in
            // the background. The visitor stays on the page; we only fall back to a
            // manual GitHub link if the API is unavailable.
            async function submitContactForm(form) {
                const subjectInput = document.getElementById('contact-subject');
                const messageInput = document.getElementById('contact-message');
                const submitButton = form.querySelector('button[type="submit"]');

                const subjectValid = validateRequiredField(subjectInput, 'Please enter a subject.');
                const messageValid = validateRequiredField(messageInput, 'Please enter a message.');
                if (!subjectValid || !messageValid || !form.reportValidity()) {
                    return;
                }

                const reasonInput = getReasonElements().input;
                const reasonKey = reasonInput?.value || 'question';
                const reasonDetails = getReasonDetails();
                const subject = subjectInput.value.trim();
                const message = messageInput.value.trim();

                const endpoint = resolveApiUrl('github-contact.php');
                if (!endpoint) {
                    // No API configured for this deployment — degrade gracefully to a
                    // pre-filled GitHub issue the visitor can submit manually.
                    setContactStatus('', {
                        state: 'error',
                        html: 'The contact service is unavailable right now. '
                            + '<a href="' + escapeHtml(buildGitHubIssueUrl(reasonDetails, subject, message))
                            + '" target="_blank" rel="noopener noreferrer">Open an issue on GitHub instead</a>.',
                    });
                    return;
                }

                if (submitButton) {
                    submitButton.disabled = true;
                }
                setContactStatus('Sending your message…', { state: 'pending' });

                try {
                    const response = await fetch(endpoint, getFetchInit({
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            reason: reasonKey,
                            subject: subject,
                            message: message,
                            details: buildDiagnosticsText(),
                        }),
                    }));

                    const payload = await response.json().catch(function () {
                        return null;
                    });

                    if (response.ok && payload && payload.ok) {
                        form.reset();
                        setReasonValue('question');
                        const issueUrl = String(payload.url || '');
                        const successHtml = 'Thanks! Your message has been sent'
                            + (issueUrl
                                ? ' — you can <a href="' + escapeHtml(issueUrl)
                                    + '" target="_blank" rel="noopener noreferrer">follow it on GitHub</a>.'
                                : '.');
                        setContactStatus('', { state: 'success', html: successHtml });
                        return;
                    }

                    // The issue is opened under the visitor's own GitHub account, so
                    // signing in is required. Offer that, plus a manual fallback that
                    // still posts as them (never as the Genepedia bot).
                    if (response.status === 401 || (payload && payload.error === 'authentication_required')) {
                        setContactStatus('', {
                            state: 'error',
                            html: 'Please sign in with GitHub (top-right) so your message is sent under your name, then try again — or '
                                + '<a href="' + escapeHtml(buildGitHubIssueUrl(reasonDetails, subject, message))
                                + '" target="_blank" rel="noopener noreferrer">open the issue on GitHub</a>.',
                        });
                        return;
                    }

                    throw new Error((payload && payload.message) || 'Request failed.');
                } catch (error) {
                    setContactStatus('', {
                        state: 'error',
                        html: 'Sorry, we could not send your message. Please try again, or '
                            + '<a href="' + escapeHtml(buildGitHubIssueUrl(reasonDetails, subject, message))
                            + '" target="_blank" rel="noopener noreferrer">open an issue on GitHub</a>.',
                    });
                } finally {
                    if (submitButton) {
                        submitButton.disabled = false;
                    }
                }
            }

            if (document.documentElement.dataset.contactFormBound !== 'true') {
                document.documentElement.dataset.contactFormBound = 'true';

                document.addEventListener('change', function (event) {
                    if (event.target?.id === 'contact-reason') {
                        updateReasonPreview();
                    }
                });

                document.addEventListener('input', function (event) {
                    const input = event.target;
                    if (input?.id === 'contact-subject' || input?.id === 'contact-message') {
                        if (input.value.trim()) {
                            input.setCustomValidity('');
                        }
                    }
                });

                document.addEventListener('submit', function (event) {
                    const form = event.target;
                    if (form?.id !== 'contact-form') {
                        return;
                    }

                    event.preventDefault();
                    void submitContactForm(form);
                });
            }

            bindReasonSelect();
            refreshContactForm();
            window.addEventListener('app:page-tab-restored', refreshContactForm);
            updateReasonPreview();
            void loadRepoConfig();
        })();
    </script>
</body>

</html>
