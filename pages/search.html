<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Search - {{APP_NAME}}</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@latest/font/bootstrap-icons.min.css">
	<link rel="stylesheet" href="../lib/Web-Framework/styles/common.css">
</head>

<body>
	<full-header></full-header>
	<article>
		<full-page-toolbar title="Search {{APP_NAME}}" edit-text="Edit Page" edit-href="#" variant="page"></full-page-toolbar>
		<main class="main-content search-page">
			<section class="search-page__panel" aria-label="Search profiles">
				<p class="search-page__lead" id="app-search-page-meta">Enter a first or last name to find people in {{APP_NAME}}.</p>

				<form class="search-page__form" id="search-page-form" action="#" role="search">
					<div class="search-page__bar app-search-anchor">
						<label for="searchPageInput" class="screen-reader-text">Search {{APP_NAME}}</label>
						<i class="bi bi-search search-page__bar-icon" aria-hidden="true"></i>
						<input id="searchPageInput" class="search-page__input" name="search" type="search"
							autofocus="autofocus" dir="auto" autocomplete="off"
							placeholder="Search by first or last name…">
						<button class="search-page__submit" type="submit" aria-label="Search">
							<span class="search-page__submit-text">Search</span>
							<i class="bi bi-arrow-right" aria-hidden="true"></i>
						</button>
					</div>
				</form>

				<div class="search-page__suggestions" id="app-search-suggestions">
					<p class="search-page__suggestions-label">Popular searches</p>
					<div class="search-page__chips">
						<a class="site-chip search-page__chip" href="#" data-query="Shaun">Shaun</a>
						<a class="site-chip search-page__chip" href="#" data-query="Roselt">Roselt</a>
						<a class="site-chip search-page__chip" href="#" data-query="Mandela">Mandela</a>
						<a class="site-chip search-page__chip" href="#" data-query="Elon">Elon</a>
					</div>
				</div>
			</section>

			<div id="app-search-results" class="search-page__results-root" aria-live="polite"></div>
		</main>
		<full-footer></full-footer>
	</article>
	<script src="../site-info.js"></script>
	<script src="../lib/people-registry.js"></script>
	<script src="../lib/Web-Framework/components/mini-header.js"></script>
	<script src="../lib/Web-Framework/components/full-header.js"></script>
	<script src="../lib/Web-Framework/components/full-page-toolbar.js"></script>
	<script src="../components/app-search.js"></script>
	<script src="../lib/Web-Framework/components/full-footer.js"></script>
	<script src="../index.js"></script>
</body>

</html>
