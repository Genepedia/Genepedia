<!doctype html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title data-brand-template="404 Not Found - {{APP_NAME}}"></title>
    <script src="../site-info.js"></script>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@latest/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../lib/Web-Framework/styles/common.css">
    <style>
        .not-found-page__actions {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .not-found-page__btn {
            display: inline-block;
            padding: 0.45rem 0.8rem;
            border-radius: var(--border-radius-base, 2px);
            border: 1px solid var(--color-border, rgba(0, 0, 0, 0.12));
            background: transparent;
            color: inherit;
            text-decoration: none;
            font: inherit;
            cursor: pointer;
        }

        .not-found-page__search {
            margin-top: 1rem;
        }

        .not-found-page__search input[type=search] {
            padding: 0.5rem;
            min-width: 220px;
        }
    </style>
</head>

<body>
    <full-header></full-header>
    <article>
        <full-page-toolbar title="404 — Page not found" edit-text="Edit Page" edit-source="pages/404.html"
            variant="page"></full-page-toolbar>
        <main class="main-content not-found-page">
            <p>We couldn't find the page you were looking for. It may have been moved or deleted.</p>

            <div class="not-found-page__actions">
                <a id="go-home" class="not-found-page__btn" href="#">Go to homepage</a>
                <button type="button" class="not-found-page__btn" onclick="history.back()">Go back</button>
            </div>

            <form id="search404" class="not-found-page__search" role="search">
                <label for="search404Input" class="screen-reader-text">Search {{APP_NAME}}</label>
                <input id="search404Input" name="q" type="search" placeholder="Search {{APP_NAME}}..."
                    autocomplete="off">
                <button type="submit" class="not-found-page__btn">Search</button>
            </form>
        </main>
        <full-footer></full-footer>
    </article>

    <script src="../lib/Web-Framework/components/mini-header.js"></script>
    <script src="../lib/Web-Framework/components/mini-footer.js"></script>
    <script src="../lib/Web-Framework/components/full-header.js"></script>
    <script src="../lib/Web-Framework/components/full-page-toolbar.js"></script>
    <script src="../lib/page-tabs.js"></script>
    <script src="../lib/Web-Framework/components/full-footer.js"></script>
    <script src="../lib/Web-Framework/components/sister-projects.js"></script>
    <script src="../index.js"></script>
    <script>
        (function () {
            const link = document.getElementById('go-home');
            const segsRaw = location.pathname.split('/').filter(Boolean);
            const segs = segsRaw.slice();
            if (segs.length && segs[segs.length - 1].includes('.')) segs.pop();

            const bases = [];
            for (let i = segs.length; i >= 0; i--) {
                const base = i > 0 ? '/' + segs.slice(0, i).join('/') + '/' : '/';
                bases.push(base);
            }

            async function exists(url) {
                try {
                    const r = await fetch(url, { method: 'HEAD', cache: 'no-store' });
                    return r && r.ok;
                } catch (e) {
                    return false;
                }
            }

            (async function resolveLinks() {
                for (const base of bases) {
                    const cand = base + 'index.html';
                    if (await exists(cand)) {
                        link.href = cand;
                        break;
                    }
                }
                if (!link.href || link.href === '#') link.href = '/';

                const searchRel = ['pages/search.html', 'search.html'];
                let searchHref = null;
                for (const base of bases) {
                    for (const rel of searchRel) {
                        const cand = base + rel;
                        if (await exists(cand)) {
                            searchHref = cand;
                            break;
                        }
                    }
                    if (searchHref) break;
                }
                if (!searchHref) searchHref = link.href;

                const form = document.getElementById('search404');
                const input = document.getElementById('search404Input');
                form.addEventListener('submit', function (e) {
                    e.preventDefault();
                    const q = (input.value || '').trim();
                    const url = new URL(searchHref, location.origin);
                    if (q) url.searchParams.set('q', q);
                    location.href = url.href;
                });
            })();
        })();
    </script>
</body>

</html>
